# МУКН | Трафик - Logrotate Configuration
# Установка: sudo cp deploy/logrotate.conf /etc/logrotate.d/mukn-traffic

/home/z/my-project/logs/*.log
/home/z/my-project/logs/**/*.log
{
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    sharedscripts
    dateext
    dateformat -%Y%m%d
    extension .log
    postrotate
        # Перезагружаем сервис для создания новых лог-файлов
        if [ -f /etc/systemd/system/mukn-traffic.service ]; then
            systemctl reload mukn-traffic > /dev/null 2>&1 || true
        fi
        if command -v pm2 &> /dev/null; then
            pm2 reloadLogs > /dev/null 2>&1 || true
        fi
    endscript
}

# Ротация бэкапов логов (сжатые)
/home/z/my-project/logs/*.gz
{
    weekly
    rotate 4
    compress
    missingok
    notifempty
}
